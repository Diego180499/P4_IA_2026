server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Sitio multipágina estático. Si no existe el archivo pedido, devuelve 404
    # (no es una SPA, así que no se reescribe todo a index.html).
    location / {
        try_files $uri $uri/ =404;
    }

    # No cachear los .js para evitar que el navegador use versiones viejas
    # durante el desarrollo (por ejemplo config.js con el host del backend).
    location ~* \.js$ {
        add_header Cache-Control "no-cache";
    }
}
